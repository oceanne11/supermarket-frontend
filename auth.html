<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmashMart — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            orange: '#EC6426', yellow: '#F8A91F', cream: '#FDE3CF',
            green: '#2B573A', lightgreen: '#72AC43', brown: '#632713', pink: '#E4A5CA',
          },
          fontFamily: { display: ['Fraunces', 'serif'], body: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #FDE3CF; }
    h1, h2 { font-family: 'Fraunces', serif; }
    .form-input {
      width: 100%; padding: 0.65rem 1rem; border: 2px solid #EC642660;
      border-radius: 0.6rem; background: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: #2B573A; }
    .toast {
      position: fixed; top: 1.5rem; right: 1.5rem; z-index: 999;
      padding: 0.9rem 1.4rem; border-radius: 0.75rem; font-weight: 600;
      transform: translateX(110%); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.show { transform: translateX(0); }
    .toast.success { background: #2B573A; color: #FDE3CF; }
    .toast.error { background: #632713; color: #FDE3CF; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.5s ease both; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div id="toast" class="toast"></div>

  <div class="w-full max-w-md fade-in">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-green rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
        <svg class="w-9 h-9 text-cream" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
      </div>
      <h1 class="text-3xl font-display font-bold text-brown">SmashMart</h1>
      <p class="text-brown/60 text-sm mt-1">Supermarket Products Manager</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">

      <!-- Tabs -->
      <div class="flex">
        <button id="loginTab" onclick="switchTab('login')"
          class="flex-1 py-4 font-display font-bold text-base transition-colors bg-green text-cream">
          Login
        </button>
        <button id="registerTab" onclick="switchTab('register')"
          class="flex-1 py-4 font-display font-bold text-base transition-colors bg-cream/50 text-brown/60">
          Register
        </button>
      </div>

      <!-- Login Form -->
      <div id="loginForm" class="p-8">
        <h2 class="text-xl font-display font-bold text-brown mb-6">Welcome back</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-brown font-semibold text-sm mb-1">Email</label>
            <input class="form-input" id="loginEmail" type="email" placeholder="you@example.com" />
          </div>
          <div>
            <label class="block text-brown font-semibold text-sm mb-1">Password</label>
            <input class="form-input" id="loginPassword" type="password" placeholder="••••••••" />
          </div>
          <button onclick="handleLogin()" id="loginBtn"
            class="w-full py-3 mt-2 bg-orange text-white rounded-xl font-display font-bold text-lg hover:bg-orange/90 active:scale-95 transition-all">
            Login
          </button>
        </div>
        <p class="text-center text-sm text-brown/50 mt-5">
          No account? <button onclick="switchTab('register')" class="text-orange font-semibold hover:underline">Register here</button>
        </p>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="p-8 hidden">
        <h2 class="text-xl font-display font-bold text-brown mb-6">Create account</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-brown font-semibold text-sm mb-1">Full Name</label>
            <input class="form-input" id="regName" type="text" placeholder="John Doe" />
          </div>
          <div>
            <label class="block text-brown font-semibold text-sm mb-1">Email</label>
            <input class="form-input" id="regEmail" type="email" placeholder="you@example.com" />
          </div>
          <div>
            <label class="block text-brown font-semibold text-sm mb-1">Password</label>
            <input class="form-input" id="regPassword" type="password" placeholder="Min. 6 characters" />
          </div>
          <div>
            <label class="block text-brown font-semibold text-sm mb-1">Role</label>
            <select class="form-input" id="regRole">
              <option value="customer">Customer</option>
              <option value="manager">Manager</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button onclick="handleRegister()" id="registerBtn"
            class="w-full py-3 mt-2 bg-green text-cream rounded-xl font-display font-bold text-lg hover:bg-green/90 active:scale-95 transition-all">
            Create Account
          </button>
        </div>
        <p class="text-center text-sm text-brown/50 mt-5">
          Have an account? <button onclick="switchTab('login')" class="text-orange font-semibold hover:underline">Login here</button>
        </p>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:5000/api/auth';

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
      document.getElementById('registerForm').classList.toggle('hidden', isLogin);
      document.getElementById('loginTab').className = `flex-1 py-4 font-display font-bold text-base transition-colors ${isLogin ? 'bg-green text-cream' : 'bg-cream/50 text-brown/60'}`;
      document.getElementById('registerTab').className = `flex-1 py-4 font-display font-bold text-base transition-colors ${!isLogin ? 'bg-green text-cream' : 'bg-cream/50 text-brown/60'}`;
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      if (!email || !password) return showToast('Please fill in all fields', 'error');

      btn.disabled = true;
      btn.textContent = 'Logging in…';

      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify({ name: data.name, role: data.role, email: data.email }));
        showToast('Welcome back, ' + data.name + '!', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    async function handleRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const role = document.getElementById('regRole').value;
      const btn = document.getElementById('registerBtn');

      if (!name || !email || !password) return showToast('Please fill in all fields', 'error');

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res = await fetch(`${API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify({ name: data.name, role: data.role, email: data.email }));
        showToast('Account created! Welcome, ' + data.name, 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const isLogin = !document.getElementById('loginForm').classList.contains('hidden');
        isLogin ? handleLogin() : handleRegister();
      }
    });

    let toastTimer;
    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg;
      toast.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
    }
  </script>
</body>
</html>
